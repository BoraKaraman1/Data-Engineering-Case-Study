kafka:
  brokers: ["redpanda:9092"]
  topic_raw:   "charging-events-raw"
  topic_clean: "charging-events-clean"
  topic_dlq:   "charging-events-dlq"
  group_realtime:  "realtime"        # latency-first consumer group -> Redis current state
  group_analytics: "analytics"       # throughput-first group -> dedup -> clean topic
  batch_size: 1000                   # clean writer coalesces concurrent writes into batches
  linger_ms:  5                      # at low concurrency each worker waits ~1 linger per produce,
                                     # so keep it small; at high volume batches fill by size first

redis:
  addr:       "redis:6379"        # current-state store: noeviction, must-persist
  dedup_addr: "redis-dedup:6379"  # dedup-key store: allkeys-lru, safe to evict

postgres:
  dsn: "postgres://chargesquare:chargesquare@postgres:5432/chargesquare?sslmode=disable"

dedup:
  ttl_sec: 120                       # sized to the redelivery window; ClickHouse catches later dups

state:
  ttl_sec: 300                       # "current status = last 5 min": key exists iff seen within 5 min
                                     # (safe: active connectors emit every <=30s, far under 300s)

metrics:
  listen: ":9102"
  pprof:  true                       # /debug/pprof for Phase-4 profiling; LOCAL-ONLY, disable in prod

workers:
  realtime:  12                       # readers per group; parallelism caps at the 12 raw partitions
  analytics: 12                      # one reader per partition; each drains a size-or-time batch

analytics:
  batch_size: 500                    # flush after N messages accumulate in a worker's batch
  flush_ms:   100                    # ...or after this long since the batch's first message,
                                     # whichever comes first. Amortises the Redis EXISTS/SET,
                                     # clean produce, and offset commit over the whole batch (H1).

realtime:
  batch_max_messages: 750            # N: flush the current-state CAS after this many messages
  batch_max_wait_ms:  25             # T: ...or this long since the batch's first message,
                                     # whichever comes first. min(N,T): under load N fires first
                                     # (T never trips -> low latency); under a trickle T fires so
                                     # an open batch flushes within T rather than waiting to reach
                                     # N. N caps tail latency (one fetch can't hand a worker a slug
                                     # so large its last event blows the <1s freshness budget); T
                                     # is the low-load client-side floor. Applies the CAS across
                                     # the batch in ONE pipelined round trip, lifting the per-event
                                     # Redis-RTT ceiling (H2).

readers:                             # per-group Kafka broker-fetch tuning (kafka-go otherwise
                                     # defaults MaxWait to 10s, stalling a trickle reader)
  realtime:                          # latency-first: fetch a lone event without waiting
    min_bytes:   1                   # no fetch-size floor...
    max_wait_ms: 50                  # ...and cap the fetch block so first-message latency stays
                                     # well under the <1s realtime freshness SLO
  analytics:                         # throughput-first: amortise broker round-trips under load
    min_bytes:   10000               # wait for a ~10KB fetch floor...
    max_wait_ms: 1000                # ...but bound the wait so trickle freshness isn't 10s either

registry:
  refresh_sec: 300                   # re-load the station/tariff roster every N seconds so new
                                     # stations / tariff changes apply without a restart; 0 disables

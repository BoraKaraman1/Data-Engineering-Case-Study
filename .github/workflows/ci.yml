name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: |
            simulator/go.sum
            processor/go.sum
      - name: simulator
        working-directory: simulator
        run: |
          go build ./...
          go vet ./...
          test -z "$(gofmt -l .)"
          go test ./... -race -count=1
      - name: processor
        working-directory: processor
        run: |
          go build ./...
          go vet ./...
          test -z "$(gofmt -l .)"
          go test ./... -race -count=1
      - name: benchmark smoke check
        run: (cd processor && go test -run '^$' -bench BenchmarkFlattenValidate -benchtime 1x ./...)

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: unit tests
        run: python -m unittest discover -s tests -v

  compose-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate compose file
        run: docker compose config -q

  airflow-dag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install airflow + clickhouse client
        # Two-step install: Airflow pinned via its official constraints file,
        # then the ClickHouse client on top, so the resolver never fights the
        # constraints.
        run: |
          pip install "apache-airflow==2.10.3" --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.3/constraints-3.12.txt"
          pip install "clickhouse-connect==0.8.*"
      - name: py_compile
        run: python -m py_compile deploy/airflow/dags/*.py
      - name: dagbag import check
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
        run: |
          python - <<'PY'
          from airflow.models import DagBag
          bag = DagBag(dag_folder="deploy/airflow/dags", include_examples=False)
          assert not bag.import_errors, bag.import_errors
          assert "ev_analytics_daily" in bag.dags, list(bag.dags)
          print("DAG OK:", list(bag.dags))
          PY

# ChargeSquare EV charging pipeline - full stack, one command: `docker compose up`
#
# Services:
#   redpanda          Kafka-compatible event backbone (single binary, no JVM/Zookeeper)
#   redpanda-console  Web UI to inspect topics, partitions, messages (http://localhost:8080)
#   redpanda-init     One-shot: creates the raw / clean / dlq topics with fixed partitions
#   clickhouse        Analytics store (columnar OLAP), self-ingests from Kafka via engine tables
#   postgres          OLTP source of truth for the station / tariff registry
#   redis             Real-time current-state store (latest power / status per connector)
#   prometheus        Scrapes simulator + processor metrics (http://localhost:9090)
#   grafana           Dashboards (http://localhost:3000, admin/admin)
#   simulator         Go: generates the charging-event firehose -> raw topic
#
#   processor         Go: validate, dedup, route raw -> Redis current-state + clean topic + dlq

name: chargesquare

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=2
      - --memory=2G
      - --mode=dev-container
    ports:
      - "19092:19092"   # Kafka API from the host (use localhost:19092 from your laptop)
      - "18081:18081"
      - "18082:18082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda-console:
    image: redpandadata/console:v2.7.2
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092

  redpanda-init:
    image: redpandadata/redpanda:v24.2.7
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        rpk topic create charging-events-raw   -p 12 -r 1 --brokers redpanda:9092 || true
        rpk topic create charging-events-clean  -p 12 -r 1 --brokers redpanda:9092 || true
        rpk topic create charging-events-dlq     -p 3  -r 1 --brokers redpanda:9092 || true
        echo "topics ready"; rpk topic list --brokers redpanda:9092
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: ev
      CLICKHOUSE_USER: chargesquare
      CLICKHOUSE_PASSWORD: chargesquare
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./deploy/clickhouse/init:/docker-entrypoint-initdb.d:ro
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: chargesquare
      POSTGRES_PASSWORD: chargesquare
      POSTGRES_DB: chargesquare
    volumes:
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chargesquare -d chargesquare"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "1gb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  # One-shot: build the roster and seed it into Postgres, then exit. Both the simulator
  # and the processor wait for this to complete, so the processor always loads a fresh,
  # complete registry (no stale-volume race).
  registry-seed:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONFIG_PATH: ${CONFIG_PATH:-/app/config/simulator.yaml}
      SEED_ONLY: "1"
    volumes:
      - ./config:/app/config:ro
    restart: "no"

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      registry-seed:
        condition: service_completed_successfully
    environment:
      # Overridable so the Phase-4 scale harness can swap in config/scale-*.yaml.
      CONFIG_PATH: ${CONFIG_PATH:-/app/config/simulator.yaml}
      SKIP_SEED: "1"   # registry-seed already loaded the roster
    ports:
      - "9101:9101"   # /metrics
    volumes:
      - ./config:/app/config:ro

  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      registry-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      CONFIG_PATH: /app/config/processor.yaml
    ports:
      - "9102:9102"   # /metrics + /debug/pprof
    volumes:
      - ./config:/app/config:ro

volumes:
  redpanda_data:
  clickhouse_data:
  postgres_data:
  prometheus_data:
  grafana_data:
